---
# Source: border-router/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "border-router"
  namespace: "garuda"
  labels:
    app.kubernetes.io/name: border-router
    app.kubernetes.io/instance: "border-router"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: garuda
    garuda.managed-by: helm
spec:
  # Recreate + replicas:1: the pod owns exclusive netns resources (dummy0, the
  # border_egress RPDB table, the Multus NADs). Two pods cannot co-exist on the
  # node, so RollingUpdate would deadlock. Mirrors the wireguard chart.
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: border-router
      app.kubernetes.io/instance: "border-router"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: border-router
        app.kubernetes.io/instance: "border-router"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: garuda
        garuda.managed-by: helm
        net.garuda-tunnel/profile: border
      annotations:
        k8s.v1.cni.cncf.io/networks: backbone@backbone,border@border
    spec:
      restartPolicy: Always
      # Pod-level sysctls: /proc/sys is read-only inside non-privileged
      # containers even with NET_ADMIN, so ip_forward must be set here. Both are
      # kubelet-"unsafe" and must be allow-listed at k3s install time
      # (--kubelet-arg=allowed-unsafe-sysctls=...). See the hub k3s init.
      securityContext:
        sysctls:
          - name: net.ipv4.ip_forward
            value: "1"
          - name: net.ipv4.conf.all.rp_filter
            value: "2"
      initContainers:
        - name: egress-setup
          image: "ghcr.io/garuda-tunnel/garuda-border-router:latest"
          imagePullPolicy: IfNotPresent
          env:
            # BR_ADDRESS materialises the OSPF router-id as the dummy0 /32;
            # the whole egress-setup is meaningless without ospf, so it is
            # guarded together with the sidecar.
            - name: BR_ADDRESS
              value: "198.51.100.50/32"
            - name: BORDER_IFACE
              value: "border"
            - name: BACKBONE_IFACE
              value: "backbone"
            - name: BR_FIXED_MSS
              value: "1240"
            - name: BR_MSS_CLAMP_ENABLED
              value: "true"
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
      containers:
        - name: anchor
          image: registry.k8s.io/pause:3.10
          imagePullPolicy: IfNotPresent
