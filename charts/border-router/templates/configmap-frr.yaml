{{- if .Values.ospf }}
{{- /*
border_router is NOT a transit provider (transit_provider=false) and does NOT
set redistribute/default_originate: its local default-via-border stays local and
is never advertised, avoiding the cf047ab kernel-redistribution default-shadow
class. Only the dummy0 /32 and backbone are advertised, via interface-mode OSPF.
*/}}
{{- $ospf := (include "borderRouter.ospf" .) | fromJson -}}
{{- $cm := include "frr-sidecar.configmap" (dict
      "name" .Values.name
      "namespace" .Values.namespace
      "ospf" $ospf
    ) -}}
{{- if $cm }}{{ $cm }}{{- end }}
{{- end }}
