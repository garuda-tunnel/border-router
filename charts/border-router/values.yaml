namespace: garuda
name: border-router
images:
  border: ""
  frr: ""
# ospf is null when omitted; the FRR sidecar and dummy0 advertisement are then
# NOT rendered. The mini-site always sets it.
ospf: null
mtuPolicy:
  # Fixed TCP MSS value for transit SYNs on the backbone interface (both
  # directions). border-router has only 1500-MTU interfaces so clamp-to-pmtu
  # is a no-op; a fixed value is used instead.
  fixedMss: 1240
  # Gates the border_mss nft table. Set to false to disable MSS clamping.
  mssClampEnabled: true
