namespace: garuda
name: border-router
images:
  border: ""
# ospf is null when omitted; the egress-setup initContainer is then NOT rendered.
# The frr-sidecar is injected by the garuda MAP, not this chart.
ospf: null
# podLabels and podAnnotations are rendered on spec.template.metadata only.
# Pass via garuda_guest.labels and garuda_guest.annotations.
podLabels: {}
podAnnotations: {}
mtuPolicy:
  # Fixed TCP MSS value for transit SYNs on the backbone interface (both
  # directions). border-router has only 1500-MTU interfaces so clamp-to-pmtu
  # is a no-op; a fixed value is used instead.
  fixedMss: 1240
  # Gates the border_mss nft table. Set to false to disable MSS clamping.
  mssClampEnabled: true
